<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huzur App Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding-bottom: 100px;
        }

        .slide {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Backgrounds */
        .bg-1 { background: linear-gradient(180deg, #FFEFD5 0%, #FFE4E1 100%); } /* Soft Peach */
        .bg-2 { background: linear-gradient(180deg, #E0F7FA 0%, #B2EBF2 100%); } /* Soft Cyan */
        .bg-3 { background: linear-gradient(180deg, #F3E5F5 0%, #E1BEE7 100%); } /* Soft Purple */
        .bg-4 { background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%); } /* Soft Green */
        .bg-5 { background: linear-gradient(180deg, #FFF3E0 0%, #FFE0B2 100%); } /* Soft Orange */

        /* Text */
        .text-container {
            margin-top: 150px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 80px;
            font-weight: 800;
            color: #2c3e50;
            margin: 0;
            line-height: 1.2;
        }

        p {
            font-size: 40px;
            color: #555;
            margin: 20px 0 0 0;
            font-weight: 600;
        }

        /* Phone Mockup */
        .phone-frame {
            width: 800px;
            height: 1600px; /* Taller to go off screen */
            background: #1a1a1a;
            border-radius: 60px 60px 0 0;
            margin-top: 100px;
            padding: 20px 20px 0 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 40px 40px 0 0;
            overflow: hidden;
            position: relative;
        }

        .phone-screen img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 0 0 30px 30px;
            z-index: 20;
        }

    </style>
</head>
<body>

    <!-- Slide 1: Home -->
    <div class="slide bg-1" id="slide1">
        <div class="text-container">
            <h1>Namaz Vakitleri</h1>
            <p>Konumunuza özel hassas vakitler</p>
        </div>
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="phone-screen">
                <img src="/marketing/home.png" alt="Home">
            </div>
        </div>
    </div>

    <!-- Slide 2: Quran -->
    <div class="slide bg-2" id="slide2">
        <div class="text-container">
            <h1>Kuran-ı Kerim</h1>
            <p>Ayet ayet meal ve sesli okuma</p>
        </div>
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="phone-screen">
                <img src="/marketing/quran.png" alt="Quran">
            </div>
        </div>
    </div>

    <!-- Slide 3: Prayers -->
    <div class="slide bg-3" id="slide3">
        <div class="text-container">
            <h1>Dualar ve Zikirler</h1>
            <p>Günlük dualar ve zikirmatik</p>
        </div>
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="phone-screen">
                <img src="/marketing/prayers.png" alt="Prayers">
            </div>
        </div>
    </div>

    <!-- Slide 4: Community -->
    <div class="slide bg-4" id="slide4">
        <div class="text-container">
            <h1>İslami İçerikler</h1>
            <p>Hikayeler ve günün sözü</p>
        </div>
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="phone-screen">
                <img src="/marketing/community.png" alt="Community">
            </div>
        </div>
    </div>

    <!-- Slide 5: Assistant -->
    <div class="slide bg-5" id="slide5">
        <div class="text-container">
            <h1>Yapay Zeka Asistan</h1>
            <p>Sorularınıza ayetlerle cevaplar</p>
        </div>
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="phone-screen">
                <img src="/marketing/assistant.png" alt="Assistant">
            </div>
        </div>
    </div>

</body>
</html>
